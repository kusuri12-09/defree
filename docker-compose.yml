services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: defree-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-defree}:${POSTGRES_PASSWORD:-defree_dev}@postgres:5432/${POSTGRES_DB:-defree}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm --filter @defree/api migration:run && node apps/api/dist/main.js"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const net=require(''net'');const s=net.connect(3000,''127.0.0.1'',()=>{s.end();process.exit(0)});s.on(''error'',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: defree-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-defree}
      POSTGRES_USER: ${POSTGRES_USER:-defree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-defree_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: defree-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
