name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/ocr/**'
      - 'packages/shared-types/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-production
  cancel-in-progress: true

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @defree/api...

      - name: Build shared packages and API
        run: |
          pnpm --filter @defree/shared-types build
          pnpm --filter @defree/ocr build
          pnpm --filter @defree/api build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH || '/opt/defree' }}
      SSH_PORT: ${{ secrets.EC2_PORT || '22' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          test -n "$PROD_ENV_FILE"

      - name: Prepare SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$SSH_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Create release archive
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s\n' "$PROD_ENV_FILE" > .env
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.turbo' \
            --exclude='coverage' \
            --exclude='logs' \
            --exclude='*.log' \
            -czf release.tar.gz .

      - name: Upload release to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ec2_key -p "$SSH_PORT" "$EC2_USER@$EC2_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/ec2_key -P "$SSH_PORT" release.tar.gz "$EC2_USER@$EC2_HOST:/tmp/defree-release.tar.gz"
          ssh -i ~/.ssh/ec2_key -p "$SSH_PORT" "$EC2_USER@$EC2_HOST" "tar -xzf /tmp/defree-release.tar.gz -C '$DEPLOY_PATH' && rm /tmp/defree-release.tar.gz"

      - name: Start containers
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ec2_key -p "$SSH_PORT" "$EC2_USER@$EC2_HOST" << EOF
            set -e
            cd "$DEPLOY_PATH"
            docker compose config >/dev/null
            docker compose up -d --build
            docker image prune -f
            docker compose ps
          EOF
